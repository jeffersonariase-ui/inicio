<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loto Dorado</title>
  <style>
    /* Estilos Generales y Reset */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body, html {
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      color: #ffffff;
    }

    /* Fondo con imagen local PORTADA.jpg */
    .bg-container {
      position: relative;
      width: 100%;
      height: 100%;
      background-image: linear-gradient(rgba(0, 0, 0, 0.25), rgba(0, 0, 0, 0.25)), url('PORTADA.jpg');
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 40px;
    }

    /* HEADER: Logo y Nombre */
    header {
      display: flex;
      align-items: center;
      gap: 15px;
      z-index: 10;
    }

    .logo {
      height: 45px;
      width: auto;
      object-fit: contain;
    }

    .brand-name {
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 2px;
      color: #ffffff;
      text-transform: uppercase;
    }

    /* CONTENIDO PRINCIPAL: Layout dividido */
    main {
      display: flex;
      width: 100%;
      max-width: 1200px;
      margin: auto;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    /* Columna Izquierda: Títulos */
    .text-column {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .text-column h1 {
      font-size: 64px;
      font-weight: 700;
      letter-spacing: 3px;
      line-height: 1.1;
      text-transform: uppercase;
    }

    /* Columna Derecha: Botones */
    .button-column {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 20px;
    }

    .btn-lang {
      display: block;
      width: 280px;
      padding: 14px 0;
      background-color: #d1c2b4; /* Color beige idéntico al de tu diseño */
      color: #2b2b2b;
      text-align: center;
      text-decoration: none;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 2px;
      border-radius: 6px;
      text-transform: uppercase;
      transition: background-color 0.3s ease, transform 0.2s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    .btn-lang:hover {
      background-color: #c2b1a1;
      transform: translateY(-2px);
    }

    /* FOOTER: Redes Sociales e Info */
    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      z-index: 10;
    }

    .social-icons {
      display: flex;
      gap: 15px;
    }

    /* Estilo de botones de Redes Sociales */
    .social-btn {
      width: 40px;
      height: 40px;
      background-color: rgba(255, 255, 255, 0.25);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #ffffff;
      text-decoration: none;
      transition: background-color 0.3s, transform 0.2s;
    }

    .social-btn:hover {
      background-color: rgba(255, 255, 255, 0.45);
      transform: scale(1.1);
    }

    .social-btn svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    /* Icono de Información (abajo a la izquierda) */
    .info-icon {
      width: 24px;
      height: 24px;
      opacity: 0.7;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }

    .info-icon svg {
      width: 20px;
      height: 20px;
      fill: #ffffff;
    }

    /* RESPONSIVE: Adaptación para Celulares */
    @media (max-width: 768px) {
      .bg-container {
        padding: 24px;
      }

      main {
        flex-direction: column;
        justify-content: center;
        gap: 50px;
        text-align: center;
      }

      .text-column h1 {
        font-size: 40px;
      }

      .button-column {
        align-items: center;
        width: 100%;
      }

      .btn-lang {
        width: 100%;
        max-width: 300px;
      }

      footer {
        flex-direction: column;
        gap: 20px;
      }
    }
  </style>
</head>
<body>

  <div class="bg-container">
    
    <!-- Header -->
    <header>
      <img src="LOTO DORADO.png" alt="Loto Dorado Logo" class="logo">
      <span class="brand-name">Loto Dorado</span>
    </header>

    <!-- Contenido Principal -->
    <main>
      <div class="text-column">
        <h1>Idioma</h1>
        <h1>Language</h1>
      </div>

      <div class="button-column">
        <!-- Reemplaza el '#' por tus enlaces cuando los tengas -->
        <a href="#" class="btn-lang">Español</a>
        <a href="#" class="btn-lang">English</a>
      </div>
    </main>

    <!-- Footer -->
    <footer>

        <!-- YouTube -->
        <a href="#" class="social-btn" aria-label="YouTube">
          <svg viewBox="0 0 24 24"><path d="M23.498 6.163c-.272-1.016-1.071-1.815-2.087-2.087-1.842-.498-9.231-.498-9.231-.498s-7.389 0-9.231.498c-1.016.272-1.815 1.071-2.087 2.087-.498 1.842-.498 5.68-.498 5.68s0 3.838.498 5.68c.272 1.016 1.071 1.815 2.087 2.087 1.842.498 9.231.498 9.231.498s7.389 0 9.231-.498c1.016-.272 1.815-1.071 2.087-2.087.498-1.842.498-5.68.498-5.68s0-3.838-.498-5.68zM9.545 15.568V8.432L15.818 12l-6.273 3.568z"/></svg>
        </a>
      </div>

      <!-- Icono de Info del Sitio -->
      <div class="info-icon" title="Información">
        <svg viewBox="0 0 24 24"><path d="M12 2c5.514 0 10 4.486 10 10s-4.486 10-10 10-10-4.486-10-10 4.486-10 10-10zm0-2c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm-.001 5.75c-.69 0-1.25.56-1.25 1.25s.56 1.25 1.25 1.25 1.25-.56 1.25-1.25-.56-1.25-1.25-1.25zm1.001 12.25h-2v-1h.5v-4h-.5v-1h1.5v5h.5v1z"/></svg>

    </footer>

  </div>

</body>
</html>
