<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loto Dorado</title>
  <style>
    /* Estilos Generales y Reset */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    
    body, html {
      width: 100%;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      overflow: hidden;
      color: #ffffff;
    }

    /* Fondo con imagen local PORTADA.jpg */
    .bg-container {
      position: relative;
      width: 100%;
      height: 100%;
      background-image: linear-gradient(rgba(0, 0, 0, 0.25), rgba(0, 0, 0, 0.25)), url('PORTADA.jpg');
      background-size: cover;
      background-position: center;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 40px;
    }

    /* HEADER: Logo y Nombre */
    header {
      display: flex;
      align-items: center;
      gap: 15px;
      z-index: 10;
    }

    .logo {
      height: 45px;
      width: auto;
      object-fit: contain;
    }

    .brand-name {
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 2px;
      color: #ffffff;
      text-transform: uppercase;
    }

    /* CONTENIDO PRINCIPAL: Layout dividido */
    main {
      display: flex;
      width: 100%;
      max-width: 1200px;
      margin: auto;
      justify-content: space-between;
      align-items: center;
      z-index: 10;
    }

    /* Columna Izquierda: Títulos */
    .text-column {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .text-column h1 {
      font-size: 64px;
      font-weight: 700;
      letter-spacing: 3px;
      line-height: 1.1;
      text-transform: uppercase;
    }

    /* Columna Derecha: Botones */
    .button-column {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 20px;
    }

    .btn-lang {
      display: block;
      width: 280px;
      padding: 14px 0;
      background-color: #d1c2b4; /* Color beige idéntico al de tu diseño */
      color: #2b2b2b;
      text-align: center;
      text-decoration: none;
      font-size: 16px;
      font-weight: 500;
      letter-spacing: 2px;
      border-radius: 6px;
      text-transform: uppercase;
      transition: background-color 0.3s ease, transform 0.2s ease;
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    .btn-lang:hover {
      background-color: #c2b1a1;
      transform: translateY(-2px);
    }

    /* FOOTER: Redes Sociales e Info */
    footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      width: 100%;
      z-index: 10;
    }

    .social-icons {
      display: flex;
      gap: 15px;
    }

    /* Estilo de botones de Redes Sociales */
    .social-btn {
      width: 40px;
      height: 40px;
      background-color: rgba(255, 255, 255, 0.25);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #ffffff;
      text-decoration: none;
      transition: background-color 0.3s, transform 0.2s;
    }

    .social-btn:hover {
      background-color: rgba(255, 255, 255, 0.45);
      transform: scale(1.1);
    }

    .social-btn svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    /* RESPONSIVE: Adaptación para Celulares */
    @media (max-width: 768px) {
      .bg-container {
        padding: 24px;
      }

      main {
        flex-direction: column;
        justify-content: center;
        gap: 50px;
        text-align: center;
      }

      .text-column h1 {
        font-size: 40px;
      }

      .button-column {
        align-items: center;
        width: 100%;
      }

      .btn-lang {
        width: 100%;
        max-width: 300px;
      }

      footer {
        flex-direction: column;
        gap: 20px;
      }
    }
  </style>
</head>
<body>
